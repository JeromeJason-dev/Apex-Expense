<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen py-10">
    <div class="max-w-4xl mx-auto px-4">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold tracking-tight">Apex Expense</h1>
            <p class="mt-2">Manage your daily spending efficiently</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1 space-y-6">
                <div class="bg-amber-50 p-6 rounded-xl shadow-lg">
                    <h2 class="text-xl font-semibold text-gray-700 mb-4">Add New Expense</h2>
                    <form id="expense-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-600">Description</label>
                            <input type="text" id="desc-input" required class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600">Amount ($)</label>
                            <input type="number" id="amount-input" step="0.01" required class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600">Category</label>
                            <select id="category-input" class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                                <option value="Food">Food</option>
                                <option value="Utilities">Utilities</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Transport">Transport</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full bg-amber-900 hover:bg-blue-700 text-white font-medium py-2 rounded-md transition duration-200">Add Expense</button>
                    </form>
                </div>

                <div class="bg-gradient-to-l from-amber-900 to-indigo-600 p-6 rounded-xl shadow-lg text-white">
                    <h3 class="text-sm uppercase tracking-wider font-semibold opacity-80">Total Expenses</h3>
                    <p id="total-amount" class="text-4xl font-extrabold mt-2">$0.00</p>
                </div>
            </div>

            <div class="md:col-span-2 bg-amber-50 p-6 rounded-xl shadow-lg flex flex-col">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                    <h2 class="text-xl font-semibold text-gray-700">Recorded Expenses</h2>
                    
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <label for="filter-category" class="text-sm font-medium text-gray-500 whitespace-nowrap">Filter by:</label>
                        <select id="filter-category" class="p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm bg-gray-50">
                            <option value="All">All Categories</option>
                            <option value="Food">Food</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Transport">Transport</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="overflow-x-auto flex-grow">
                    <table class="min-w-full divide-y divide-gray-200 text-left text-sm">
                        <thead class="bg-gray-50 text-gray-700 uppercase font-semibold text-xs tracking-wider">
                            <tr>
                                <th class="px-4 py-3">Description</th>
                                <th class="px-4 py-3">Category</th>
                                <th class="px-4 py-3">Amount</th>
                                <th class="px-4 py-3 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="expense-list" class="divide-y divide-gray-100 text-gray-600">
                            </tbody>
                    </table>
                    <div id="empty-state" class="text-center py-12 text-gray-400 hidden">
                        No expenses found.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="Tracker.js"></script>
</body>
</html>
